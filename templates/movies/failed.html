<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Failed | BookMySeat</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .failed-box {
            background: #111827;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 420px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        h1 {
            color: #ef4444;
            margin-bottom: 15px;
        }

        p {
            color: #cbd5f5;
            margin: 8px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #ef4444;
            color: #ffffff;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            background: #dc2626;
        }

        .retry {
            background: #22c55e;
            color: #000;
            margin-right: 10px;
        }

        .retry:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="failed-box">
    <h1>❌ Payment Failed</h1>

    <p>Your payment was cancelled or unsuccessful.</p>
    <p>No seats were booked.</p>

    <button class="btn retry" onclick="retryPayment()">Retry Payment</button>
    <button class="btn" onclick="goHome()">Go to Home</button>
</div>

<script>
    function retryPayment() {
        // Redirect user back to seat booking page
        window.history.back();
    }

    function goHome() {
        window.location.href = "/";
    }

    // Optional: auto-redirect after 10 seconds
    setTimeout(function () {
        window.location.href = "/";
    }, 10000);
</script>

</body>
</html>
