<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ticket Confirmation</title>
    <style>
        body {
            background: #f4f6f8;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .ticket {
            max-width: 500px;
            background: #ffffff;
            margin: auto;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            color: #e50914;
        }
        .details p {
            margin: 8px 0;
            font-size: 15px;
        }
        .footer {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 20px;
        }
        .seat {
            background: #e50914;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            margin: 3px;
        }
    </style>
</head>
<body>

<div class="ticket">
    <div class="header">
        <h2>🎟️ Ticket Confirmed</h2>
        <p>BookMySeat</p>
    </div>

    <div class="details">
        <p><strong>Name:</strong> {{ user.username }}</p>
        <p><strong>Movie:</strong> {{ movie.name }}</p>
        <p><strong>Theater:</strong> {{ theater.name }}</p>

        <p><strong>Seats:</strong><br>
            {% for seat in seats %}
                <span class="seat">{{ seat }}</span>
            {% endfor %}
        </p>
    </div>

    <div class="footer">
        Please arrive 15 minutes early 🍿<br>
        Thank you for booking with BookMySeat
    </div>
</div>

</body>
</html>
