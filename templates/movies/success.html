<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful | BookMySeat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .success-box {
            background: #111827;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 420px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        h1 {
            color: #22c55e;
            margin-bottom: 10px;
        }
        p {
            color: #cbd5f5;
            margin: 6px 0;
        }
        .seats {
            margin-top: 10px;
            font-weight: bold;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #22c55e;
            color: #000;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: bold;
        }
        a:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="success-box">
    <h1>✅ Payment Successful</h1>

    <p><strong>Movie:</strong> {{ booking.movie.name }}</p>
    <p><strong>Theater:</strong> {{ booking.theater.name }}</p>
    <p><strong>Amount Paid:</strong> ₹{{ booking.amount }}</p>

    <p class="seats">
        🎟 Seats Booked: {{ seats|join:", " }}
    </p>

    <p>📧 Ticket details have been sent to your email.</p>

    <a href="/">Go to Home</a>
</div>

</body>
</html>
