<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment | BookMySeat</title>

    <!-- Razorpay Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .payment-box {
            background: #111827;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        h2 {
            margin-bottom: 10px;
        }
        p {
            color: #cbd5f5;
        }
        button {
            margin-top: 20px;
            background: #22c55e;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="payment-box">
    <h2>🎬 {{ movie_name }}</h2>
    <p>Total Amount: ₹{{ amount|divisibleby:100 }}</p>

    <button id="pay-btn">Pay Now</button>
</div>

<script>
    var options = {
        "key": "{{ key }}",
        "amount": "{{ amount }}",   // Amount in paise
        "currency": "INR",
        "name": "BookMySeat",
        "description": "Movie Ticket Booking",
        "order_id": "{{ order_id }}",

        "handler": function (response) {
            // Payment Success
            window.location.href =
                "/movies/payment-success/?payment_id=" + response.razorpay_payment_id;
        },

        "modal": {
            "ondismiss": function () {
                // Payment Failed / Cancelled
                window.location.href = "/movies/payment-failed/";
            }
        },

        "theme": {
            "color": "#22c55e"
        }
    };

    var rzp1 = new Razorpay(options);

    document.getElementById('pay-btn').onclick = function (e) {
        rzp1.open();
        e.preventDefault();
    };
    var options = {
    "key": "{{ key }}",
    "amount": "{{ amount }}",
    "currency": "INR",
    "name": "{{ movie_name }}",
    "order_id": "{{ order_id }}",

    "handler": function (response) {
        window.location.href =
            "/payment-success/?razorpay_payment_id=" +
            response.razorpay_payment_id;
    },

    "modal": {
        "ondismiss": function () {
            // ❌ User closed payment popup
            window.location.href = "/payment-failed/";
        }
    }
};

var rzp1 = new Razorpay(options);
rzp1.open();
</script>

</body>
</html>
