<h1>{{ movie.name }}</h1>

<img src="{{ movie.image.url }}" width="300">

<p>{{ movie.description }}</p>
<p>⭐ Rating: {{ movie.rating }}</p>

{% if movie.trailer_url %}
<hr>
<h3>🎬 Watch Trailer</h3>
<iframe width="100%" height="400"
    src="{{ movie.trailer_url }}"
    frameborder="0"
    allowfullscreen>
</iframe>
{% endif %}

<a href="{% url 'theater_list' movie.id %}">Book Tickets</a>
